title: HVL RevealJS
author: julienvollering
version: 1.0.0
quarto-required: ">=1.4.0"
contributes:
  formats:
    revealjs:
      theme: hvl-theme.scss
      slide-number: false
      progress: true
      hash: true
      controls: false
      transition: slide
      transition-speed: fast
      highlight-style: github
      code-line-numbers: true
